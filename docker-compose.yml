services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: zm-codex-db
    ports:
      - "30432:5432"
    environment:
      POSTGRES_DB: zm_codex
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex_local_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex -d zm_codex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
